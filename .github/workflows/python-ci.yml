name: Python CI

on:
  push:
    branches:
      - develop
      - main

  pull_request:
    branches:
      - develop
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 가져오기
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: 패키지 설치
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Black 검사
        run: |
          black --check .

      - name: isort 검사
        run: |
          isort --check-only .

      - name: flake8 검사
        run: |
          flake8 .

      - name: pytest 실행
        run: |
          pytest
